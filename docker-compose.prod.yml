# ============================================
# Update Center - Production Compose
# 使用预构建镜像（如你自己 build 后 tag/push）
# ============================================

services:
  update-center:
    image: uname-update-center:latest
    container_name: uname-update-center
    user: "${UPDATE_CENTER_USER:-1001:1001}"
    restart: unless-stopped
    ports:
      - "${PORT:-8600}:8600"
    env_file:
      - .env
    environment:
      UPDATE_DATA_DIR: ${UPDATE_DATA_DIR:-/data/update_center/updates}
      TRUST_PROXY: ${TRUST_PROXY:-1}
    volumes:
      - "${UPDATE_DATA_DIR_HOST:-/data/update_center/updates}:${UPDATE_DATA_DIR:-/data/update_center/updates}"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8600/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
